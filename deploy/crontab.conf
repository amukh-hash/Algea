# ═══════════════════════════════════════════════════════════════════════
# Algaie Day-2 Operations — Cron Schedule (UTC)
# ═══════════════════════════════════════════════════════════════════════
#
# IMPORTANT: All times are UTC.  The host machine MUST run TZ=Etc/UTC.
#
# Execution order matters:
#   1. T+1 resolution (21:30 UTC / 16:30 ET) writes to ece_tracking
#   2. Nightly DAG     (23:00 UTC / 18:00 ET) reads  ece_tracking FSM
#
# WAL mode + busy_timeout pragmas on all SQLite connections eliminate
# the need for the previous 6-hour serialization gap.  The T+1 job is
# now post-market (16:30 ET), safely outside the live trading window.
# ═══════════════════════════════════════════════════════════════════════

# 1. Resolve T+1 Outcomes at 21:30 UTC (16:30 ET — post-market, post-flatten)
30 21 * * 1-5 /opt/algaie/venv/bin/python /opt/algaie/backend/scripts/08_t1_resolution.py >> /var/log/algaie/t1_resolution.log 2>&1

# 2. Execute Nightly DAG orchestrator at 23:00 UTC (18:00 ET)
0 23 * * 1-5 /opt/algaie/venv/bin/python /opt/algaie/backend/scripts/07_nightly_run.py --mode production >> /var/log/algaie/nightly_run.log 2>&1

