# ─────────────────────────────────────────────────────────────────────
# Algae Trading Platform — Nginx Sunsetting Configuration
#
# Applied after 14-day shadow validation to decommission the legacy
# Next.js frontend. Backend API routes remain fully operational for
# the native C++ client's REST polling.
#
# The Next.js PM2 process is left dormant (not killed) for a 48-hour
# rollback window. After the window expires, tear down Node containers.
#
# Deploy: sudo cp algae_sunset.conf /etc/nginx/sites-enabled/algae.conf
#         sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name trade.algae.internal;

    # TLS — adjust paths to your certificate chain
    ssl_certificate     /etc/ssl/algae/fullchain.pem;
    ssl_certificate_key /etc/ssl/algae/privkey.pem;

    # ── 1. Backend API: Fully operational for Native Client ──────────
    # RestClient.cpp polls /api/control/state and /api/control/portfolio-summary
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "keep-alive";
    }

    # ── 2. Legacy Web UI Routes: HTTP 410 Gone ───────────────────────
    # Intercepts all Next.js page routes. Returns 410 to force operators
    # to use Algae_Live.exe. Cache-Control headers prevent CDN/browser
    # from caching stale 200 responses from before the cutover.
    location ~ ^/(overview|risk|portfolio|sleeves|orchestrator|jobs|ops|artifacts|settings)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        return 410 "The Algae Web UI has been decommissioned. Please launch Algae_Live.exe.";
    }

    # ── 3. Next.js Static Assets: Terminated ─────────────────────────
    location /_next/ {
        return 410;
    }

    # ── 4. Root redirect ─────────────────────────────────────────────
    location = / {
        return 410 "The Algae Web UI has been decommissioned. Please launch Algae_Live.exe.";
    }
}
